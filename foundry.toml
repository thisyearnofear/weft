[profile.default]
# Keep Solidity components scoped to /contracts to stay modular with other repo domains
src = "contracts/src"
test = "contracts/test"
script = "contracts/script"
out = "contracts/out"
cache_path = "contracts/cache"

solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true

# Reproducible builds
cbor_metadata = false
bytecode_hash = "none"

[fmt]
line_length = 100
tab_width = 4
