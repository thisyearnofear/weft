# Hermes Agent Configuration for Weft

## Overview
This configuration extends Hermes with custom skills for autonomous milestone verification.

## Skills (Implementation Notes)

MVP is intentionally narrow and deterministic. See `docs/mvp.md` for the canonical
milestone template and attestation schema.

Planned Hermes workflows (to be implemented under `agent/skills/`):
- **weft-verify**: deterministic verification for the MVP template (deployment + unique callers)
- **weft-attest**: package evidence into a single attestation JSON + content-addressed root
- **weft-ens**: update ENS text records after milestone finalization

## Verification Flow

1. **Trigger**: Milestone deadline passes
2. **Collect**: Run all three skills in parallel
3. **Synthesize**: Use Kimi models to analyze evidence
4. **Attest**: Generate structured attestation object
5. **Determine**: Binary verified/unverified
6. **Write**: Store evidence to 0G Storage
7. **Release**: Trigger KeeperHub for capital release

## AXL Multi-Node Consensus

- Run 3 Hermes nodes independently
- Each node verifies the same milestone
- Broadcast determinations over Gensyn AXL
- 2-of-3 agreement triggers capital release

## Configuration

```yaml
# hermes.config.yml
agent:
  name: weft-verifier
  model: kimi
  
skills:
  - weft-verify
  - weft-attest
  - weft-ens

storage:
  evidence: 0g-storage
  kv_store: 0g-kv
  
consensus:
  protocol: axl
  nodes: 3
  threshold: 2
```

## Environment Variables

```bash
# Required
GITHUB_TOKEN=ghp_xxx
KIMI_API_KEY=sk-xxx
ZERO_G_RPC=https://...
ENS_DOMAIN=xxx.eth

# Optional
AXL_PORT=3000
HERMES_PORT=8080
```
