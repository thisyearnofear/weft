# Hermes Agent Configuration for Weft

## Overview

Weft extends Hermes with deterministic onchain evidence collection.
See `AGENTS.md` for the canonical agent workflow.

## Agent Workflow (End-to-End)

1. **Poll** — `deadline_scheduler.py` scans for milestones past deadline
2. **Collect** — `github_client` (commits/PRs) + `mvp_verifier` (deployment/usage)
3. **Verify** — build attestation, check deployment + usage signals
4. **AXL Consensus** — broadcast verdict, poll peers, tally quorum (optional)
5. **Store** — `zero_storage` writes evidence to 0G Storage (auto if configured)
6. **ENS** — update builder profile with verified milestone (auto if config)
7. **Submit** — call `submitVerbid()` onchain

## CLI Usage

```bash
# Full flow with 0G Storage + ENS + AXL
python agent/scripts/weft_collect_attestation.py \
  --rpc-url "$ETH_RPC_URL" \
  --weft-milestone "$WEFT_CONTRACT_ADDRESS" \
  --milestone-hash "0x..." \
  --contract-address "0x..." \
  --out agent/.attestations/attestation.json \
  --publish-0g \
  --ens-name "builder.weft.eth" \
  --axl-poll 30

# Output includes:
#   VERIFIED=true|false
#   HAS_QUORUM=true|false  (if AXL_PEERS set)
#   ENS_UPDATED=true|false (if --ens-name provided)
#   STORAGE_LOG_ROOT=0x... (if 0G configured)
```

## Environment Variables

```yaml
# Blockchain (required)
ETH_RPC_URL: "http://127.0.0.1:8545"          # 0G Chain RPC

# Contract addresses (required for verification)
WEFT_CONTRACT_ADDRESS: "0x..."                # Deployed WeftMilestone
VERIFIER_ADDRESS: "0x..."                     # This node's wallet (for submission)
VERIFIER_PRIVATE_KEY: "0x..."                  # Private key (for submitting verdict)

# Milestone verifier (optional)
GITHUB_TOKEN: "ghp_..."                      # GitHub personal access token (repo:read)
KIMI_API_KEY: "sk-..."                       # Kimi/Moonshot API key
POLL_INTERVAL: "3600"                         # Seconds between poll cycles
```

## 0G Storage (optional — falls back to local files)

```yaml
ZERO_G_INDEXER_URL: "https://..."                # Storage indexer RPC
ZERO_G_STREAM_ID: "0x..."                    # KV stream ID
ZERO_G_RPC_URL: "https://..."                 # 0G Chain RPC (if different)
```

## AXL Consensus (optional)

```yaml
AXL_PEERS: "http://node-b:9001,http://node-c:9001"   # Peer HTTP endpoints
# When set: broadcasts verdict + polls for peers + tallies quorum
# Quorum=2 by default (2-of-3)
```

## ENS (optional — portable reputation)

```yaml
# Builder's ENS name to update after verification:
# Pass --ens-name "builder.weft.eth" to CLI
# Requires: VERIFIER_PRIVATE_KEY set for setText transactions
```

## KeeperHub (optional — reliable onchain execution)

```yaml
KEEPERHUB_API_KEY: "kh_..."             # API key from app.keeperhub.com
KEEPERHUB_API_URL: "https://app.keeperhub.com"  # Optional API URL override
KEEPERHUB_TIMEOUT: "120"              # Seconds to wait for tx confirmation
KEEPERHUB_ENABLED: "1"                 # Set to "0" to disable even if API key is set
# When KEEPERHUB_API_KEY is set: submitVerdict() goes through KeeperHub
#   (automatic retry, gas optimization, audit trail)
# When unset: falls back to cast send (existing behavior)
```

## Verification Criteria (MVP)

A milestone is `verified=true` when ALL:
- **Deployment**: contract code exists at stated address
- **Usage**: >= unique-caller-threshold unique callers in measurement window

AXL consensus overrides verdict only if quorum reached.
ENS profile updated only if verified AND quorum met (or single-node mode).