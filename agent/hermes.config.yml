# Hermes Agent Configuration for Weft

## Overview

Weft extends Hermes with deterministic onchain evidence collection.
See `AGENTS.md` for the canonical agent workflow.

## Agent Workflow

1. **Poll** — `deadline_scheduler.py` scans for milestones past deadline
2. **Collect** — `github_client` (commits/PRs) + `mvp_verifier` (deployment/usage)
3. **Narrate** — `kimi_client` generates human-readable summary (optional)
4. **Attest** — `mvp_verifier.build_attestation()` produces attestation JSON
5. **Store** — `zero_storage` writes evidence to 0G Storage (optional, MVP: local files)

Multi-node consensus via AXL is **planned** — MVP runs single-node with manual quorum.

## Environment Variables

```yaml
# Blockchain (required)
ETH_RPC_URL: "http://127.0.0.1:8545"          # 0G Chain RPC

# Contract addresses (required for verification)
WEFT_CONTRACT_ADDRESS: "0x..."                # Deployed WeftMilestone
VERIFIER_ADDRESS: "0x..."                     # This node's wallet

# Milestone verifier (optional)
GITHUB_TOKEN: "ghp_..."                      # GitHub personal access token (repo:read)
KIMI_API_KEY: "sk-..."                       # Kimi/Moonshot API key
POLL_INTERVAL: "3600"                         # Seconds between poll cycles (default: 3600)
```

## 0G Storage (optional — falls back to local files when unset)

```yaml
ZERO_G_EVM_RPC_URL: "https://..."             # 0G Chain EVM RPC
ZERO_G_INDEXER_RPC: "https://..."             # 0G Storage indexer RPC
ZERO_G_PRIVATE_KEY: "0x..."                   # Signer private key (or reuse PRIVATE_KEY)
ZERO_G_STREAM_ID: "0x..."                    # KV stream ID
```

## Consensus (planned)

```yaml
AXL_PORT: "9002"                             # AXL P2P port (future)
AXL_PEERS: "node-b:9001,node-c:9001"         # Peer addresses (future)
```

## Verification Criteria (MVP)

A milestone is `verified=true` when ALL:
- **Deployment**: contract code exists at stated address
- **Usage**: >= unique-caller-threshold unique callers in measurement window

GitHub commits are collected as additional evidence but do not gate the verdict.
Override: if Kimi confidence < 0.6, return `verified=false`.
