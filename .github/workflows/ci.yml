name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Solidity Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install forge-std
        run: cd contracts && forge install foundry-rs/forge-std && cd ..

      - name: Run Forge tests
        run: forge test

  agent:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run all agent tests
        run: python -m pytest agent/test/ -v

  imports:
    name: Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify imports
        run: |
          python -c "
          from agent.lib import (
              mvp_verifier, github_client, kimi_client, deadline_scheduler,
              zero_storage, indexer_client, jsonrpc, abi, weft_milestone_reader,
              axl_client, peer_inbox, verdict_envelope, keeperhub_client,
              ens_client, verifier_registry_reader, metadata_reader,
              bundle_manifest, bundle_pack
          )
          print('All imports OK')
          "

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_DEFAULT_CHAIN: sepolia
